services:
    server:
        image: ghcr.io/yugveer06/crabdrop/server:latest
        # To build locally instead, comment out 'image' above and uncomment:
        # build:
        #     context: ./apps/server
        #     dockerfile: Dockerfile
        env_file:
            - .env
        ports:
            # Reverted to default binding (0.0.0.0) to match working bots configuration
            - "3001:3001"
        restart: unless-stopped
        networks:
            - crabnet

networks:
    crabnet:
        enable_ipv6: true
        driver: bridge
        ipam:
            config:
                - subnet: "172.28.0.0/16"
                - subnet: "fd00:dead:beef::/48"
