name: Deploy Backend to VPS

on:
    push:
        branches: [master]
        paths:
            - "apps/server/**"
            - "docker-compose.yml"
            - ".env.example"
            - ".github/workflows/deploy-backend.yml"
    workflow_dispatch:

env:
    # Docker doesn't allow uppercase in image names
    IMAGE_NAME: ghcr.io/yugveer06/crabdrop/server

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: ./apps/server
                  push: true
                  tags: |
                      ${{ env.IMAGE_NAME }}:latest
                      ${{ env.IMAGE_NAME }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USERNAME }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      set -e

                      DEPLOY_DIR="$HOME/crabdrop"

                      # Clone if first time, otherwise pull latest
                      if [ ! -d "$DEPLOY_DIR" ]; then
                        git clone git@github.com:Yugveer06/crabdrop.git "$DEPLOY_DIR"
                      fi

                      cd "$DEPLOY_DIR"
                      git fetch origin master
                      git reset --hard origin/master

                      # Write .env from GitHub secret
                      echo '${{ secrets.ENV_FILE }}' > .env

                      # Log in to GHCR on the VPS (requires a PAT with read:packages scope)
                      # Create one at: https://github.com/settings/tokens → "read:packages"
                      # Then add it as GH_PAT in your repo secrets
                      echo '${{ secrets.GH_PAT }}' | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

                      # Pull the pre-built image and restart
                      docker compose pull server
                      docker compose up -d server

                      # Clean up old Docker images
                      docker image prune -f

                      echo "✅ Backend deployed successfully!"
